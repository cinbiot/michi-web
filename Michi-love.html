<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Para Michi ❤️</title>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            overflow: hidden;
            background: radial-gradient(circle, #1a0033 0%, #050010 100%);
            font-family: 'Arial', sans-serif;
        }
        #pantalla-inicio {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #050010;
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 100; transition: opacity 1s ease-in-out;
        }
        .boton-iniciar {
            padding: 15px 35px; font-size: 1.3rem; color: white;
            background: linear-gradient(45deg, #ff3385, #ff0066);
            border: none; border-radius: 50px; cursor: pointer;
            box-shadow: 0 0 20px #ff3385; font-weight: bold;
            transition: transform 0.2s;
        }
        .boton-iniciar:hover { transform: scale(1.05); }
        h1 {
            position: absolute; top: 20%; width: 100%; text-align: center;
            font-size: 3rem; color: #ffffff;
            text-shadow: 0 0 10px #ff3385, 0 0 20px #ff3385, 0 0 40px #ff0066;
            font-weight: bold; letter-spacing: 3px; z-index: 10;
            margin: 0; opacity: 0; transition: opacity 1.5s ease-in-out;
        }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 2; }
        .personajes-container {
            position: absolute; bottom: 5%; width: 100%;
            display: flex; justify-content: space-between;
            padding: 0 10%; box-sizing: border-box; z-index: 5;
        }
        .personaje {
            position: relative; width: 55px; height: 48px;
            background: #ffffff; border-radius: 50% 50% 42% 42%;
            box-shadow: 0 0 15px rgba(255,255,255,0.6);
        }
        .personaje::before, .personaje::after {
            content: ''; position: absolute; top: -6px;
            width: 14px; height: 14px; background: #ffffff; border-radius: 50%;
        }
        .personaje::before { left: 4px; }
        .personaje::after { right: 4px; }
        .cara { position: absolute; top: 18px; width: 100%; height: 10px; }
        .cara::before, .cara::after {
            content: ''; position: absolute;
            width: 5px; height: 5px; background: #222; border-radius: 50%;
        }
        .izq .cara::before { left: 14px; }
        .izq .cara::after { left: 32px; }
        .der .cara::before { right: 32px; }
        .der .cara::after { right: 14px; }
        .mejillas {
            position: absolute; top: 22px;
            width: 8px; height: 4px; background: #ff99bb; border-radius: 50%;
        }
        .izq .m-1 { left: 8px; } .izq .m-2 { left: 38px; }
        .der .m-1 { right: 38px; } .der .m-2 { right: 8px; }

        /* Botón volver */
        #btn-volver {
            position: fixed; top: 16px; left: 16px; z-index: 200;
            padding: 8px 18px; border-radius: 999px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(0,0,0,0.4); color: rgba(255,255,255,0.7);
            font-size: 13px; cursor: pointer; display: none;
            backdrop-filter: blur(6px); text-decoration: none;
        }
        #btn-volver:hover { color: white; border-color: rgba(255,80,130,0.5); }
    </style>
</head>
<body>

    <audio id="miMusica" src="https://pnjxhzuayhsqvlitfaak.supabase.co/storage/v1/object/public/Media/musica.mp3" loop></audio>

    <div id="pantalla-inicio">
        <button class="boton-iniciar" id="btnIniciar">Toca aquí, Michi... ❤️</button>
    </div>

    <a id="btn-volver" href="/">← Volver</a>
    <h1 id="texto">Michi te amo</h1>
    <canvas id="escena"></canvas>

    <div class="personajes-container">
        <div class="personaje izq" id="michiIzq">
            <div class="cara"></div>
            <div class="mejillas m-1"></div>
            <div class="mejillas m-2"></div>
        </div>
        <div class="personaje der" id="michiDer">
            <div class="cara"></div>
            <div class="mejillas m-1"></div>
            <div class="mejillas m-2"></div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('escena');
        const ctx = canvas.getContext('2d');
        const texto = document.getElementById('texto');
        const musica = document.getElementById('miMusica');
        const pantallaInicio = document.getElementById('pantalla-inicio');
        const btnIniciar = document.getElementById('btnIniciar');
        const btnVolver = document.getElementById('btn-volver');

        function ajustarPantalla() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        ajustarPantalla();
        window.addEventListener('resize', ajustarPantalla);

        let estrellas = [], particulasTrayecto = [], particulasCorazon = [];
        let estado = 'esperando';
        let pIzq, pDer, lX1, lY1, lX2, lY2;
        let escala = Math.min(canvas.width, canvas.height) * 0.022;
        let centroX = canvas.width / 2;
        let centroY = canvas.height * 0.52;

        function puntoCorazon(t) {
            const x = 16 * Math.pow(Math.sin(t), 3);
            const y = 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
            return { x: x * escala, y: -y * escala };
        }

        let puntoInicioCorazon = { x: centroX + puntoCorazon(Math.PI).x, y: centroY + puntoCorazon(Math.PI).y };
        let tIzq = Math.PI, tDer = Math.PI;

        for(let i = 0; i < 100; i++) {
            estrellas.push({ x: Math.random()*canvas.width, y: Math.random()*canvas.height, r: Math.random()*1.2, b: Math.random() });
        }

        function inicializarPosiciones() {
            pIzq = document.getElementById('michiIzq').getBoundingClientRect();
            pDer = document.getElementById('michiDer').getBoundingClientRect();
            lX1 = pIzq.left + 27; lY1 = pIzq.top;
            lX2 = pDer.left + 27; lY2 = pDer.top;
        }

        btnIniciar.addEventListener('click', () => {
            musica.play().catch(e => console.log(e));
            pantallaInicio.style.opacity = '0';
            setTimeout(() => {
                pantallaInicio.style.display = 'none';
                btnVolver.style.display = 'block';
                inicializarPosiciones();
                escala = Math.min(canvas.width, canvas.height) * 0.022;
                centroX = canvas.width / 2;
                centroY = canvas.height * 0.52;
                puntoInicioCorazon = { x: centroX + puntoCorazon(Math.PI).x, y: centroY + puntoCorazon(Math.PI).y };
                estado = 'trayecto';
                animar();
            }, 1000);
        });

        function animar() {
            if (estado === 'esperando') return;
            ctx.fillStyle = 'rgba(5, 0, 16, 0.24)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            estrellas.forEach(e => {
                ctx.beginPath();
                ctx.arc(e.x, e.y, e.r, 0, Math.PI * 2);
                ctx.fillStyle = `rgba(255,255,255,${Math.abs(Math.sin(e.b))})`;
                ctx.fill(); e.b += 0.01;
            });

            if (estado === 'trayecto') {
                let dx1 = puntoInicioCorazon.x - lX1, dy1 = puntoInicioCorazon.y - lY1;
                let dx2 = puntoInicioCorazon.x - lX2, dy2 = puntoInicioCorazon.y - lY2;
                lX1 += dx1*0.06; lY1 += dy1*0.06;
                lX2 += dx2*0.06; lY2 += dy2*0.06;
                for(let i=0; i<3; i++) {
                    particulasTrayecto.push({x:lX1,y:lY1,vx:(Math.random()-.5)*2,vy:(Math.random()-.5)*2,alfa:1,color:'#ff3385'});
                    particulasTrayecto.push({x:lX2,y:lY2,vx:(Math.random()-.5)*2,vy:(Math.random()-.5)*2,alfa:1,color:'#ff4da6'});
                }
                if (Math.abs(dx1) < 6 && Math.abs(dy1) < 6) estado = 'dibujando';
            }

            if (estado === 'dibujando') {
                if (tIzq > 0) { tIzq -= 0.04; let p=puntoCorazon(tIzq); particulasCorazon.push({x:centroX+p.x,y:centroY+p.y,r:Math.random()*2+1.5,b:Math.random()}); }
                if (tDer < Math.PI*2) { tDer += 0.04; let p=puntoCorazon(tDer); particulasCorazon.push({x:centroX+p.x,y:centroY+p.y,r:Math.random()*2+1.5,b:Math.random()}); }
                if (tIzq <= 0 && tDer >= Math.PI*2) {
                    estado = 'mostrando'; texto.style.opacity = '1';
                    setTimeout(() => { estado = 'reiniciando'; }, 5000);
                }
            }

            if (estado === 'reiniciando') {
                texto.style.opacity = '0';
                particulasCorazon = []; particulasTrayecto = [];
                tIzq = Math.PI; tDer = Math.PI;
                inicializarPosiciones(); estado = 'trayecto';
            }

            particulasTrayecto.forEach((p, idx) => {
                p.x+=p.vx; p.y+=p.vy; p.alfa-=0.02;
                if(p.alfa<=0){particulasTrayecto.splice(idx,1);return;}
                ctx.beginPath(); ctx.arc(p.x,p.y,2.5,0,Math.PI*2);
                ctx.fillStyle=p.color; ctx.shadowBlur=10; ctx.shadowColor='#ff3385';
                ctx.fill(); ctx.shadowBlur=0;
            });

            particulasCorazon.forEach(p => {
                ctx.beginPath();
                ctx.arc(p.x+Math.sin(p.b)*1.5, p.y+Math.cos(p.b)*1.5, p.r, 0, Math.PI*2);
                ctx.fillStyle=`rgba(255,51,133,${0.7+Math.abs(Math.sin(p.b))*0.3})`;
                ctx.shadowBlur=12; ctx.shadowColor='#ff0066';
                ctx.fill(); ctx.shadowBlur=0; p.b+=0.05;
            });

            requestAnimationFrame(animar);
        }
    </script>
</body>
</html>
